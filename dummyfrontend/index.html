<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StackPulse Pro | AI Technical Advisor</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0a0c;
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, transparent),
                radial-gradient(circle at bottom left, #0f172a, transparent);
            color: var(--text);
            padding: 2rem;
        }

        .container {
            max-width: 1300px;
            margin: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 1.5rem;
        }

        .grid {
            display: grid;
            grid-template-columns: 350px 1fr 350px;
            gap: 1rem;
        }

        input,
        textarea {
            width: 100%;
            background: #000;
            border: 1px solid var(--border);
            color: var(--text);
            padding: .6rem;
            border-radius: .5rem;
            margin-bottom: .8rem;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: .6rem;
            border-radius: .5rem;
            cursor: pointer;
        }

        button:hover {
            background: var(--primary-hover);
        }

        .terminal {
            background: #000;
            height: 150px;
            overflow: auto;
            padding: 1rem;
            font-family: monospace;
            color: #00ff00;
        }

        .chat-msg {
            padding: .6rem;
            margin-bottom: .5rem;
            border-radius: .5rem;
        }

        .user-msg {
            background: var(--primary);
            margin-left: auto;
        }

        .ai-msg {
            background: #111;
        }

        .runway-bar {
            height: 10px;
            background: var(--accent);
            width: 40%;
        }
    </style>
</head>

<body>

    <div class="container">

        <header>
            <div>
                <h1>StackPulse</h1>
                <p id="display-founder">demo-founder-001</p>
            </div>

            <div>
                <div id="health-score">--</div>
                <small>Health Score</small>
            </div>
        </header>

        <div class="grid">

            <!-- LEFT -->
            <div class="card">
                <h3>Project Context</h3>

                <input id="founder-id" value="demo-founder-001">

                <input id="burn-rate" type="number" value="8000">

                <textarea id="stack-json" rows="8">{}</textarea>

                <button id="btn-register">Sync</button>

                <h4>Runway</h4>
                <div class="runway-bar" id="runway-bar"></div>
                <p id="runway-days">120 Days</p>
            </div>

            <!-- CENTER -->
            <div class="card">
                <button id="btn-brief">Run Scan</button>

                <div id="terminal" class="terminal"></div>

                <div id="brief-content"></div>
            </div>

            <!-- RIGHT -->
            <div>
                <div class="card">
                    <h3>Chat</h3>

                    <div id="chat-window" style="height:150px;overflow:auto"></div>

                    <input id="chat-input">
                    <button id="btn-chat">Send</button>
                </div>

                <div class="card">
                    <textarea id="change-desc"></textarea>
                    <button id="btn-analyze">Simulate</button>
                    <div id="analyze-result"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API_BASE = "http://localhost:8080";
        let baseRunway = 120;

        function log(msg, color = "#0f0") {
            const t = document.getElementById("terminal");
            const d = document.createElement("div");
            d.style.color = color;
            d.textContent = "> " + msg;
            t.appendChild(d);
            t.scrollTop = t.scrollHeight;
        }

        async function api(path, method = "GET", body = null) {
            try {
                const res = await fetch(API_BASE + path, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: body ? JSON.stringify(body) : null
                });

                if (!res.ok) throw new Error("Server error");
                return await res.json();

            } catch (e) {
                log("API Error: " + e.message, "red");
                return { success: false };
            }
        }

        /* -------- SAFE JSON -------- */
        function getStackJSON() {
            try {
                return JSON.parse(document.getElementById("stack-json").value);
            } catch {
                log("Invalid JSON in stack input", "red");
                return null;
            }
        }

        /* -------- REGISTER -------- */
        document.getElementById("btn-register").onclick = async () => {
            const id = document.getElementById("founder-id").value;
            const burn = parseFloat(document.getElementById("burn-rate").value);
            const stack = getStackJSON();

            if (!id || !stack) return;

            log("Syncing...");

            const res = await api("/stack/register", "POST", { founder_id: id, stack, burn_rate: burn });

            if (res.success) {
                log("Synced ✔", "#0f0");
                document.getElementById("display-founder").textContent = id;
            }
        };

        /* -------- BRIEF -------- */
        document.getElementById("btn-brief").onclick = async () => {
            const container = document.getElementById("brief-content");
            container.innerHTML = "";

            log("Scanning ecosystem...");

            const res = await api("/brief/generate", "POST", { founder_id: document.getElementById("founder-id").value });

            if (!res.success) return;

            container.innerHTML = `<p>${res.data.summary}</p>`;

            res.data.actions.forEach((a, i) => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `
        <b>${a.title}</b>
        <p>${a.details}</p>
        <button onclick="handleAction('${i}','done')">Done</button>
        `;
                container.appendChild(div);
            });
        };

        /* -------- ACTION -------- */
        async function handleAction(id, status) {
            log("Action " + status, "#818cf8");
        }

        /* -------- CHAT -------- */
        document.getElementById("btn-chat").onclick = sendChat;

        document.getElementById("chat-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendChat();
        });

        async function sendChat() {
            const input = document.getElementById("chat-input");
            const msg = input.value.trim();
            if (!msg) return;

            const win = document.getElementById("chat-window");

            win.innerHTML += `<div class="chat-msg user-msg">${msg}</div>`;
            input.value = "";

            const res = await api("/chat", "POST", { question: msg });

            if (res.success) {
                win.innerHTML += `<div class="chat-msg ai-msg">${res.data.answer}</div>`;
            }

            win.scrollTop = win.scrollHeight;
        }

        /* -------- SIMULATION -------- */
        document.getElementById("btn-analyze").onclick = async () => {
            const desc = document.getElementById("change-desc").value;
            if (!desc) return;

            const res = await api("/analyze/cost-impact", "POST", { change: desc });

            if (res.success) {
                const d = res.data;

                const newRunway = baseRunway + (d.runway_extension_days || 0);

                document.getElementById("runway-days").textContent = newRunway + " Days";
                document.getElementById("runway-bar").style.width = Math.min(100, newRunway / 2) + "%";

                document.getElementById("analyze-result").innerHTML =
                    `<b>$${d.monthly_saving}</b> saved`;
            }
        };
    </script>

</body>

</html>
